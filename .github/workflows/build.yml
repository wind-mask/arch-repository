name: Build Packages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_run:
    workflows: ["Sync AUR Packages"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      build_packages:
        description: "要构建的包名（逗号分隔），支持 aur/ 下的包（如 aur/activitywatch-bin）"
        required: false
        default: ""
        type: string
      build_all_packages:
        description: "构建所有包（包括 aur/ 下的包）"
        required: false
        default: false
        type: boolean

jobs:
  # ===============================================================
  # Job 1: 查找包含更新的 PKGBUILD 的目录
  # ===============================================================
  find_packages:
    runs-on: ubuntu-latest
    # workflow_run 触发时，只在源 workflow 成功时运行
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以便比较变更
          persist-credentials: false

      - name: Generate matrix of package directories
        id: set_matrix
        run: |
          # 查找所有包含 PKGBUILD 的目录
          ALL_PKG_DIRS=$(find . -name PKGBUILD -exec dirname {} \;)

          # 手动触发时根据 inputs 决定构建哪些包
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_EVENT_INPUTS_BUILD_ALL_PACKAGES}" == "true" ]]; then
              SELECTED_PKG_DIRS=(${ALL_PKG_DIRS})
            else
              IFS=',' read -ra INPUT_PKGS <<< "${GITHUB_EVENT_INPUTS_BUILD_PACKAGES}"
              SELECTED_PKG_DIRS=()
              for pkg in "${INPUT_PKGS[@]}"; do
                pkg=$(echo "$pkg" | xargs)
                if [[ -d "$pkg" && -f "$pkg/PKGBUILD" ]]; then
                  SELECTED_PKG_DIRS+=("$pkg")
                elif [[ -d "./aur/$pkg" && -f "./aur/$pkg/PKGBUILD" ]]; then
                  SELECTED_PKG_DIRS+=("./aur/$pkg")
                elif [[ -d "./$pkg" && -f "./$pkg/PKGBUILD" ]]; then
                  SELECTED_PKG_DIRS+=("./$pkg")
                fi
              done
            fi

          # workflow_run 触发时（由 sync-aur 触发），比较最近的 commit
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "Triggered by workflow_run, comparing HEAD~1 and HEAD"
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
            HEAD_SHA=$(git rev-parse HEAD)

            if [[ -n "$BASE_SHA" ]]; then
              CHANGED_FILES=$(git diff --name-only ${BASE_SHA} ${HEAD_SHA})
            else
              SELECTED_PKG_DIRS=(${ALL_PKG_DIRS})
            fi

          # push / pull_request 事件
          else
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BASE_SHA=${{ github.event.pull_request.base.sha }}
              HEAD_SHA=${{ github.event.pull_request.head.sha }}
            else
              BASE_SHA=${{ github.event.before }}
              HEAD_SHA=${{ github.event.after }}

              if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
                echo "New branch push, building all packages"
                SELECTED_PKG_DIRS=(${ALL_PKG_DIRS})
              elif ! git cat-file -t "$BASE_SHA" &>/dev/null; then
                echo "Force push detected (before SHA not found)"
                PUSH_COMMITS_JSON='${{ toJson(github.event.commits) }}'
                PUSH_COMMITS_COUNT=$(echo "$PUSH_COMMITS_JSON" | jq '. | length')

                if [[ "$PUSH_COMMITS_COUNT" -gt 0 ]]; then
                  POTENTIAL_BASE=$(git rev-parse "HEAD~${PUSH_COMMITS_COUNT}" 2>/dev/null)
                  if [[ -n "$POTENTIAL_BASE" ]] && git cat-file -t "$POTENTIAL_BASE" &>/dev/null; then
                    BASE_SHA=$POTENTIAL_BASE
                  fi
                fi

                if [[ -z "${BASE_SHA:-}" ]] || ! git cat-file -t "$BASE_SHA" &>/dev/null; then
                  if [[ "$PUSH_COMMITS_JSON" != "null" && "$PUSH_COMMITS_JSON" != "[]" ]]; then
                    CHANGED_FILES=$(echo "$PUSH_COMMITS_JSON" | jq -r '.[].added[], .[].modified[]' 2>/dev/null | sort -u)
                  fi
                  if [[ -z "${CHANGED_FILES:-}" ]]; then
                    echo "Cannot determine changes, building all packages"
                    SELECTED_PKG_DIRS=(${ALL_PKG_DIRS})
                  fi
                fi
              fi
            fi

            # 通过 diff 获取变更
            if [[ ${#SELECTED_PKG_DIRS[@]} -eq 0 ]]; then
              if [[ -z "${CHANGED_FILES:-}" && -n "${BASE_SHA:-}" ]]; then
                echo "Comparing changes between ${BASE_SHA} and ${HEAD_SHA}"
                CHANGED_FILES=$(git diff --name-only ${BASE_SHA} ${HEAD_SHA})
              fi

              for pkg_dir in ${ALL_PKG_DIRS}; do
                if echo "$CHANGED_FILES" | grep -q "^${pkg_dir#./}"; then
                  SELECTED_PKG_DIRS+=("$pkg_dir")
                fi
              done
            fi
          fi

          # 如果没有选中的包，则输出空数组
          if [ ${#SELECTED_PKG_DIRS[@]} -eq 0 ]; then
            echo "No package directories selected"
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            # 将选中的包目录转换为 JSON 数组
            MATRIX_JSON=$(printf '%s\n' "${SELECTED_PKG_DIRS[@]}" | jq -R . | jq -s .)
            echo "Selected package directories: ${MATRIX_JSON}"
            echo matrix=${MATRIX_JSON} >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_EVENT_INPUTS_BUILD_ALL_PACKAGES: ${{ github.event.inputs.build_all_packages }}
          GITHUB_EVENT_INPUTS_BUILD_PACKAGES: ${{ github.event.inputs.build_packages }}

  # ===============================================================
  # ===============================================================
  # Job 2: 根据找到的目录列表，为每个更新的包进行构建
  # ===============================================================
  build_package:
    needs: find_packages
    runs-on: ubuntu-latest
    # 只有当矩阵不为空时才运行
    if: ${{ fromJson(needs.find_packages.outputs.matrix)[0] != null }}
    strategy:
      fail-fast: false
      matrix:
        package_dir: ${{ fromJson(needs.find_packages.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Build package in ${{ matrix.package_dir }}
        uses: wind-mask/archlinux-package-action@main
        with:
          path: ${{ matrix.package_dir }}
          updpkgsums: true
          aur: true
          srcinfo: true

      - name: Commit checksum and srcinfo changes
        uses: EndBug/add-and-commit@v10
        with:
          add: '${{ matrix.package_dir }}/PKGBUILD ${{ matrix.package_dir }}/.SRCINFO'
          default_author: github_actions
          message: '📦 build(${{ matrix.package_dir }}): 更新校验和和 .SRCINFO'
